# =============================================================================
# Nginx Reverse Proxy Configuration
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile    on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # ── Upstream Services ────────────────────────────────────────────────────
    upstream todo_service {
        server todo-service:8001;
    }

    upstream attachment_service {
        server attachment-service:8002;
    }

    upstream notification_service {
        server notification-service:8003;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ── Server Block ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── API: Todo Service ────────────────────────────────────────────────
        location /api/v1/todos {
            proxy_pass         http://todo_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── API: Attachment Service ──────────────────────────────────────────
        location /api/v1/attachments {
            proxy_pass         http://attachment_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── API: Notification Service ────────────────────────────────────────
        location /api/v1/notifications {
            proxy_pass         http://notification_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Frontend (React) ────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ── Health Check ────────────────────────────────────────────────────
        location /nginx-health {
            return 200 '{"status": "healthy", "service": "nginx"}';
            add_header Content-Type application/json;
        }
    }
}
